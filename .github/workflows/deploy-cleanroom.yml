name: Deploy clean-room preview

on:
  push:
    branches:
      - design/portfolio-v5-cleanroom
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cleanroom-preview
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish preview branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages-v5
          publish_dir: ./dist
          force_orphan: true
